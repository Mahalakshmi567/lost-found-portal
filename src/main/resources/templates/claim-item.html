<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">
    <title>Claim Item</title>
</head>
<body>

<div class="claim-page">

    <div class="claim-card">

        <h1 class="claim-title">
            Claim Item
        </h1>

        <p class="claim-subtitle">
            Submit a request to claim this found item.
        </p>

        <form th:object="${claimRequest}"
              th:action="@{/claims/save/{id}(id=${itemId})}"
              method="post">

            <div class="claim-group">

                <label>Your Name</label>

                <input type="text"
                       th:field="*{claimantName}"
                       class="claim-input">

                <div class="error-text"
                     th:errors="*{claimantName}">
                </div>

            </div>

            <div class="claim-group">

                <label>Reason for Claim</label>

                <textarea th:field="*{reason}"
                          class="claim-textarea">
                </textarea>

                <div class="error-text"
                     th:errors="*{reason}">
                </div>

            </div>

            <div class="claim-group">

                <label>Contact Number</label>

                <input type="text"
                       th:field="*{contactNumber}"
                       class="claim-input">

                <div class="error-text"
                     th:errors="*{contactNumber}">
                </div>

            </div>

            <button type="submit"
                    class="claim-submit-btn">

                Submit Claim Request

            </button>

        </form>

    </div>

</div>

</body>
</html>
