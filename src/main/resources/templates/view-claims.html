<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>View Claims</title>

    <link rel="stylesheet" href="/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="claims-page">

    <div class="claims-card">

        <h1 class="claims-title">
            Claims for:
            <span th:text="${item.itemName}"></span>
        </h1>

        <table class="claims-table">

            <thead>

            <tr>
                <th>Name</th>
                <th>Reason</th>
                <th>Contact</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="claim : ${claims}">

                <td th:text="${claim.claimantName}"></td>

                <td th:text="${claim.reason}"></td>

                <td th:text="${claim.contactNumber}"></td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
</html>
