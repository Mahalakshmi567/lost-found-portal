<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Item</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
             <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">
```
</head>

<body>

<div class="edit-page">

    <div class="edit-card">

        <h1 class="edit-title">
            Edit Item
        </h1>

        <form th:action="@{/items/update}"
              method="post"
              th:object="${item}">

            <!-- Hidden ID -->
            <input type="hidden" th:field="*{id}">

            <!-- Item Name -->
            <div class="edit-group">

                <label>Item Name</label>

                <input type="text"
                       class="edit-input"
                       th:field="*{itemName}"
                       required>

            </div>

            <!-- Description -->
            <div class="edit-group">

                <label>Description</label>

                <textarea class="edit-textarea"
                          th:field="*{description}"
                          required></textarea>

            </div>

            <!-- Location -->
            <div class="edit-group">

                <label>Location</label>

                <input type="text"
                       class="edit-input"
                       th:field="*{location}"
                       required>

            </div>

            <!-- Date -->
            <div class="edit-group">

                <label>Date</label>

                <input type="date"
                       class="edit-input"
                       th:field="*{date}">

            </div>

            <!-- Contact -->
            <div class="edit-group">

                <label>Contact Information</label>

                <input type="text"
                       class="edit-input"
                       th:field="*{contactInfo}">

            </div>

            <!-- Image -->
            <div class="edit-group"
                 th:if="${item.imagePath != null}">

                <label>Current Image</label>

                <br>

                <img th:src="@{'/uploads/' + ${item.imagePath}}"
                     class="edit-image-preview">

            </div>

            <!-- Buttons -->
            <div style="margin-top:20px;">

                <button type="submit" class="edit-btn">
                    Update Item
                </button>

                <a href="/my-posts" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
