<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>My Posts</title>
<link rel="stylesheet" href="/css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container posts-container">

    <h1 class="page-title">
        My Posts
    </h1>
    <div class="mini-header">

    <div>

        <p class="mini-subtitle">
            Manage your lost and found reports
        </p>
    </div>

</div>
    <div class="row">

        <div class="col-lg-4 col-md-6 mb-4"
             th:each="item : ${items}">

            <div class="my-post-card">

                <img th:if="${item.imagePath != null}"
                     th:src="@{'/uploads/' + ${item.imagePath}}"
                     class="my-post-image">

                <div class="my-post-content">

                    <h5 th:text="${item.itemName}">
                    </h5>

                    <p th:text="${item.description}">
                    </p>

                    <span th:if="${item.status=='LOST'}"
                          class="post-status status-lost">
                        LOST
                    </span>

                    <span th:if="${item.status=='FOUND'}"
                          class="post-status status-found">
                        FOUND
                    </span>

                    <div class="action-buttons">

                        <a th:href="@{/items/edit/{id}(id=${item.id})}"
                           class="edit-btn">
                            Edit
                        </a>

                        <a th:href="@{/items/delete/{id}(id=${item.id})}"
                           class="delete-btn">
                            Delete
                        </a>

                        <a th:if="${item.status == 'FOUND'}"
                           th:href="@{/claims/item/{id}(id=${item.id})}"
                           class="claims-btn">
                            View Claims
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
