<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dashboard - Lost & Found Portal</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      th:href="@{/css/style.css}">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet">
```

</head>

<body>

<nav class="custom-navbar">

```
<div class="container">

    <div class="navbar-content">

        <a href="/dashboard" class="logo-text">
            Lost & Found Portal
        </a>

        <div class="nav-buttons">

            <a href="/my-posts" class="custom-btn burgundy-btn">
                My Posts
            </a>

            <a href="/items/lost/new" class="custom-btn warning-btn">
                Report Lost
            </a>

            <a href="/items/found/new" class="custom-btn success-btn">
                Report Found
            </a>

            <a href="/logout" class="custom-btn danger-btn">
                Logout
            </a>

        </div>

    </div>

</div>
```

</nav>

<div class="container mt-5">

```
<div class="hero-card">

    <h1>
        Lostify
    </h1>

    <p>
        Helping people reconnect with their belongings safely and efficiently.
    </p>

</div>

<div class="search-card">

    <form th:action="@{/dashboard}"
          method="get"
          class="row g-3">

        <div class="col-md-8">

            <input type="text"
                   name="keyword"
                   class="search-input"
                   placeholder="Search items by name...">

        </div>

        <div class="col-md-2">

            <button type="submit"
                    class="search-btn">
                Search
            </button>

        </div>

        <div class="col-md-2">

            <a href="/dashboard"
               class="reset-btn">
                Reset
            </a>

        </div>

    </form>

</div>

<div class="filter-section">

    <a href="/dashboard"
       class="filter-btn">
        All
    </a>

    <a href="/dashboard?status=LOST"
       class="filter-btn lost-filter">
        Lost
    </a>

    <a href="/dashboard?status=FOUND"
       class="filter-btn found-filter">
        Found
    </a>

</div>

<h2 class="section-title">
    All Items
</h2>

<div class="row">

    <div class="col-lg-4 col-md-6 mb-4"
         th:each="item : ${items}">

        <div class="item-card">

            <img th:if="${item.imagePath != null and !item.imagePath.isEmpty()}"
                 th:src="@{'/uploads/' + ${item.imagePath}}"
                 class="item-image">

            <div class="item-content">

                <h4 th:text="${item.itemName}">
                </h4>

                <p class="description"
                   th:text="${item.description}">
                </p>

                <p>
                    📍 <span th:text="${item.location}"></span>
                </p>

                <p>
                    📅 <span th:text="${item.date}"></span>
                </p>

                <p>
                    📞 <span th:text="${item.contactInfo}"></span>
                </p>

                <span th:if="${item.status == 'LOST'}"
                      class="status-badge lost-badge">
                    LOST
                </span>

                <span th:if="${item.status == 'FOUND'}"
                      class="status-badge found-badge">
                    FOUND
                </span>

                <div class="mt-3">

                    <a th:if="${item.status == 'FOUND'}"
                       th:href="@{/claims/new/request/{id}(id=${item.id})}"
                       class="claim-btn">

                        Claim Item

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>
```

</div>

<footer class="footer">

```
© 2026 Lost & Found Portal
```

</footer>

</body>
</html>
