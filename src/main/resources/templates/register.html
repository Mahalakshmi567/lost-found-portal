<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Register - Lost & Found Portal</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1 class="portal-title">
            Create Account
        </h1>

        <p class="portal-subtitle">
            Join the Lost & Found Portal and help reconnect people with their belongings.
        </p>

        <form method="post"
              th:action="@{/register}"
              th:object="${user}">

            <div class="form-group">

                <label>Full Name</label>

                <input type="text"
                       th:field="*{name}"
                       placeholder="Enter your full name"
                       required>

            </div>

            <div class="form-group">

                <label>Email Address</label>

                <input type="email"
                       th:field="*{email}"
                       placeholder="Enter your email"
                       required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input type="password"
                       th:field="*{password}"
                       placeholder="Create a password"
                       required>

            </div>

            <button type="submit"
                    class="login-btn">

                Create Account

            </button>

        </form>

        <div class="register-section">

            Already have an account?

            <a href="/login">
                Login Here
            </a>

        </div>

    </div>

</div>

</body>
</html>
