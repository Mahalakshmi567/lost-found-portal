<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Lost Item</title>
      <link rel="stylesheet" href="/css/style.css">
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>
<body>

<div class="container item-form-page">

    <div class="item-form-card">

        <h1 class="item-form-title">
            Report Lost Item
        </h1>

        <p class="item-form-subtitle">
            Provide details about the item you lost to help others identify and return it.
        </p>

        <form th:object="${item}"
              th:action="@{/items/lost/save}"
              method="post"
              enctype="multipart/form-data">

            <div class="item-group">

                <label>Item Name</label>

                <input type="text"
                       th:field="*{itemName}"
                       class="item-input">

                <div class="error-text"
                     th:if="${#fields.hasErrors('itemName')}"
                     th:errors="*{itemName}">
                </div>

            </div>

            <div class="item-group">

                <label>Description</label>

                <textarea th:field="*{description}"
                          class="item-textarea">
                </textarea>

                <div class="error-text"
                     th:if="${#fields.hasErrors('description')}"
                     th:errors="*{description}">
                </div>

            </div>

            <div class="item-group">

                <label>Location Lost</label>

                <input type="text"
                       th:field="*{location}"
                       class="item-input">

                <div class="error-text"
                     th:if="${#fields.hasErrors('location')}"
                     th:errors="*{location}">
                </div>

            </div>

            <div class="item-group">

                <label>Date Lost</label>

                <input type="date"
                       name="date"
                       class="item-input">

            </div>

            <div class="item-group">

                <label>Contact Information</label>

                <input type="text"
                       name="contactInfo"
                       class="item-input"
                       placeholder="Phone Number / Email">

            </div>

            <div class="item-group">

                <label>Upload Item Image</label>

                <input type="file"
                       name="image"
                       class="file-upload">

            </div>

            <button type="submit"
                    class="submit-item-btn">

                Submit Lost Item Report

            </button>

        </form>

    </div>

</div>

</body>
</html>
